# Week 3 Vanilla GRPO (500 step) — full training
# Optimized for A800-80GB with Flash-Attention 2
# Run: bash scripts/20_run_week3_vanilla.sh
hydra:
  searchpath:
    - pkg://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files: experiments/week3_vanilla/train.parquet
  val_files: experiments/week3_vanilla/val.parquet
  train_batch_size: 4
  max_prompt_length: 8192
  max_response_length: 12288
  return_raw_chat: True
  tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml

actor_rollout_ref:
  model:
    path: experiments/week2_sft_lora_merged
    enable_gradient_checkpointing: true
    lora_rank: 16
    lora_alpha: 32
    use_fused_kernels: true
    fused_kernel_options:
      impl_backend: torch
    override_config:
      attn_implementation: flash_attention_2
  actor:
    fsdp_config:
      optimizer_offload: true       # 绝对不能关
      param_offload: true          # 权重常驻GPU，+14GB，提速
      model_dtype: bf16
    optim:
      lr: 5.0e-6
    use_kl_loss: True
    kl_loss_coef: 0.01
    kl_loss_type: low_var_kl
    use_fused_kernels: true
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 2
  rollout:
    name: "vllm"
    mode: async
    agent:
      default_agent_loop: tool_agent
    multi_turn:
      enable: True
      format: "hermes"
      max_user_turns: 15
      max_assistant_turns: 15
      tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml
      interaction_config_path: configs/interaction_config/tau_bench_airline.yaml
    n: 8                              # group size 8，baseline更稳
    temperature: 0.7
    top_p: 0.9
    tensor_model_parallel_size: 2     # GPU0+GPU1 做TP
    calculate_log_probs: true         # vLLM生成时计算log_prob，跳过FSDP actor重算
    gpu_memory_utilization: 0.5      # 给FSDP留更多空间
    free_cache_engine: true           # 必须保持！
    max_num_seqs: 12                  # 并发
    max_model_len: 24576
    max_num_batched_tokens: 24576
    log_prob_micro_batch_size_per_gpu: 4   # bypass_mode下actor不重算，但ref仍要算，保守值
  ref:
    fsdp_config:
      optimizer_offload: true
      param_offload: true            # 同步改为true
      use_fused_kernels: true
      model_dtype: bf16
    model:
      path: experiments/week2_sft_lora_merged
      override_config:
        attn_implementation: flash_attention_2
    log_prob_micro_batch_size_per_gpu: 4   # 与actor同步

algorithm:
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.01
  rollout_correction:
    bypass_mode: true                # 直接用rollout_log_probs当old_log_probs，跳过actor重算

trainer:
  total_epochs: 50                    # train仅40条，50epoch=40*50/4=500steps
  total_training_steps: 500
  save_freq: 50
  test_freq: 100
  default_local_dir: experiments/week3_vanilla/checkpoints
  logger: ['console', 'swanlab']
  project_name: agentic-grpo-longhorizon
  experiment_name: week3_vanilla_grpo_500step
  n_gpus_per_node: 2                  # GPU0+GPU1做policy
  nnodes: 1
